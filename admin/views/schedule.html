<h1>📄 Schedule Manager</h1>

<div class="cards">

<div class="card">

<h3>Upload New Schedule</h3>

<input type="file"
       id="scheduleFile"
       accept="image/png,image/jpeg,image/webp">

<br><br>

<img id="preview"
     style="display:none;max-width:100%;border-radius:12px;">

<br><br>

<button id="uploadBtn">

Upload Schedule

</button>

<p id="status"></p>

</div>

<div class="card">

<h3>Current Schedule</h3>

<img id="currentSchedule"

style="width:100%;border-radius:12px;">

</div>

</div>
